<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <!-- Immediate Theme & Direction Initialization to prevent Flash/Layout Shift -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const savedDir = localStorage.getItem('dir');
            if (savedDir === 'rtl') {
                document.documentElement.setAttribute('dir', 'rtl');
            } else {
                document.documentElement.removeAttribute('dir');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for AeroFly Indoor Skydiving to start booking your wind tunnel experience.">
    <title>Sign Up | AeroFly Indoor Skydiving</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    
    <style>
        .signup-container {
            max-width: 480px;
            width: 100%;
            padding: 2.5rem;
            margin: 2rem auto;
        }
        .form-control {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background-color: var(--bg-secondary);
            border-color: var(--primary);
            color: var(--text-main);
            box-shadow: 0 0 0 0.25rem rgba(var(--primary-rgb), 0.25);
        }
        .input-group-text {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 0.75rem;
        }
        .social-btn {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }
        .social-btn:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--primary);
            color: var(--text-main);
        }
        /* Top right controls container */
        .page-controls {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
        }
        /* RTL style adjustment */
        html[dir="rtl"] .page-controls {
            right: auto;
            left: 1.5rem;
        }
        /* Handle input-group border radius in RTL */
        html[dir="rtl"] .input-group > .form-control {
            border-top-left-radius: 0 !important;
            border-bottom-left-radius: 0 !important;
            border-top-right-radius: 0.75rem !important;
            border-bottom-right-radius: 0.75rem !important;
        }
        html[dir="rtl"] .input-group > .btn {
            border-top-right-radius: 0 !important;
            border-bottom-right-radius: 0 !important;
            border-top-left-radius: 0.75rem !important;
            border-bottom-left-radius: 0.75rem !important;
        }
    </style>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center position-relative py-5">

    <!-- Theme & RTL Toggles (Top Right Corner, absolute) -->
    <div class="page-controls d-flex align-items-center gap-2">
        <button id="theme-toggle" class="btn btn-outline-secondary px-3 py-2 d-flex align-items-center justify-content-center" style="border-radius: 0.75rem;" aria-label="Toggle Theme">
            <i class="bi bi-sun-fill"></i>
        </button>
        <button id="rtl-toggle" class="btn btn-outline-secondary px-3 py-2 fw-bold" style="border-radius: 0.75rem;" aria-label="Toggle RTL">
            RTL
        </button>
    </div>

    <!-- Background Orbs -->
    <div class="glow-orb position-absolute top-0 start-0 translate-middle" style="opacity: 0.1; width: 400px; height: 400px;"></div>
    <div class="glow-orb position-absolute bottom-0 end-0 translate-middle-y" style="opacity: 0.1; width: 400px; height: 400px; background: var(--secondary);"></div>

    <!-- Signup Card -->
    <div class="container d-flex justify-content-center align-items-center">
        <div class="glass-card signup-container rounded-4 shadow-xl border border-secondary">
            <!-- Brand Logo / Name -->
            <div class="text-center mb-4">
                <a href="index.html" class="d-inline-flex align-items-center text-decoration-none text-main-theme mb-3">
                    <i class="bi bi-wind me-2 fs-3 text-primary"></i>
                    <span class="fs-4 fw-bold text-gradient">AeroFly</span>
                </a>
                <h3 class="fw-bold text-main-theme">Create Account</h3>
                <p class="text-light-muted">Join AeroFly and start your flight journey</p>
            </div>

            <!-- Signup Form -->
            <form action="#" method="POST">
                <!-- First Name Input -->
                <div class="mb-3">
                    <label for="first-name" class="form-label text-main-theme fw-medium small">First Name</label>
                    <input type="text" id="first-name" name="first-name" class="form-control" placeholder="John" required>
                </div>

                <!-- Last Name Input -->
                <div class="mb-3">
                    <label for="last-name" class="form-label text-main-theme fw-medium small">Last Name</label>
                    <input type="text" id="last-name" name="last-name" class="form-control" placeholder="Doe" required>
                </div>

                <!-- Email Input -->
                <div class="mb-3">
                    <label for="email" class="form-label text-main-theme fw-medium small">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>

                <!-- Password Input with Toggle -->
                <div class="mb-3">
                    <label for="password" class="form-label text-main-theme fw-medium small mb-1">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Create password" required style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                        <button class="btn btn-outline-secondary border-secondary px-3" type="button" id="toggle-password" style="border-top-left-radius: 0; border-bottom-left-radius: 0; border-top-right-radius: 0.75rem; border-bottom-right-radius: 0.75rem;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password Input -->
                <div class="mb-4">
                    <label for="confirm-password" class="form-label text-main-theme fw-medium small mb-1">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" id="confirm-password" name="confirm-password" class="form-control" placeholder="Repeat password" required style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                        <button class="btn btn-outline-secondary border-secondary px-3" type="button" id="toggle-confirm-password" style="border-top-left-radius: 0; border-bottom-left-radius: 0; border-top-right-radius: 0.75rem; border-bottom-right-radius: 0.75rem;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-glow mb-4">Sign Up</button>

                <!-- Social Logins -->
                <div class="mb-4">
                    <div class="d-flex align-items-center mb-3">
                        <hr class="flex-grow-1 border-secondary opacity-25">
                        <span class="mx-3 text-light-muted small fw-medium">Or sign up with</span>
                        <hr class="flex-grow-1 border-secondary opacity-25">
                    </div>
                    <div class="d-flex flex-column gap-2">
                        <button type="button" class="social-btn w-100">
                            <i class="bi bi-google text-danger fs-5"></i> Google
                        </button>
                        <button type="button" class="social-btn w-100">
                            <i class="bi bi-apple fs-5"></i> Apple
                        </button>
                    </div>
                </div>

                <!-- Login Link -->
                <div class="text-center">
                    <p class="text-light-muted mb-0 small">Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-medium hover-text-white">Log in</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
    
    <!-- Password Visibility Toggle Script -->
    <script>
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });
        document.getElementById('toggle-confirm-password').addEventListener('click', function() {
            const confirmPasswordInput = document.getElementById('confirm-password');
            const icon = this.querySelector('i');
            if (confirmPasswordInput.type === 'password') {
                confirmPasswordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                confirmPasswordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });
    </script>
</body>
</html>
